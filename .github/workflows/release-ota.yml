name: Build and publish OTA release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to publish
        required: true
        default: v1.0.0
      release_title:
        description: Optional release title
        required: false
        default: AppwriteStarterKit OTA

permissions:
  contents: write

env:
  PROJECT_PATH: AppwriteStarterKit.xcodeproj
  SCHEME: AppwriteStarterKit
  IPA_NAME: AppwriteStarterKit.ipa
  PLIST_NAME: AppwriteStarterKit.plist

jobs:
  build-and-publish:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Validate signing secrets
        run: |
          set -euo pipefail
          IOS_CERT_P12_BASE64="${{ secrets.IOS_CERT_P12_BASE64 }}"
          IOS_CERT_P12_PASSWORD="${{ secrets.IOS_CERT_P12_PASSWORD }}"
          IOS_PROVISIONING_PROFILE_BASE64="${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}"

          if [ -z "$IOS_CERT_P12_BASE64" ]; then
            echo "::error::Missing IOS_CERT_P12_BASE64 secret"
            exit 1
          fi
          if [ -z "$IOS_CERT_P12_PASSWORD" ]; then
            echo "::error::Missing IOS_CERT_P12_PASSWORD secret"
            exit 1
          fi
          if [ -z "$IOS_PROVISIONING_PROFILE_BASE64" ]; then
            echo "::error::Missing IOS_PROVISIONING_PROFILE_BASE64 secret"
            exit 1
          fi

      - name: Import signing assets
        run: |
          set -euo pipefail

          IOS_CERT_P12_BASE64="${{ secrets.IOS_CERT_P12_BASE64 }}"
          IOS_CERT_P12_PASSWORD="${{ secrets.IOS_CERT_P12_PASSWORD }}"
          IOS_PROVISIONING_PROFILE_BASE64="${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}"

          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="build-${GITHUB_RUN_ID}"

          echo "$IOS_CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$IOS_CERT_P12_PASSWORD" -A -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/"
          security cms -D -i "$PROFILE_PATH" > "$RUNNER_TEMP/profile.plist"

          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c 'Print :Name' "$RUNNER_TEMP/profile.plist")
          TEAM_ID=$(/usr/libexec/PlistBuddy -c 'Print :TeamIdentifier:0' "$RUNNER_TEMP/profile.plist")

          echo "PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"
          echo "TEAM_ID=$TEAM_ID" >> "$GITHUB_ENV"

      - name: Resolve build settings
        run: |
          set -euo pipefail

          BUNDLE_ID=$(xcodebuild -showBuildSettings -project "$PROJECT_PATH" -scheme "$SCHEME" | awk -F' = ' '/PRODUCT_BUNDLE_IDENTIFIER/ {print $2; exit}')
          MARKETING_VERSION=$(xcodebuild -showBuildSettings -project "$PROJECT_PATH" -scheme "$SCHEME" | awk -F' = ' '/MARKETING_VERSION/ {print $2; exit}')

          if [ -z "$BUNDLE_ID" ]; then
            echo "::error::Unable to resolve PRODUCT_BUNDLE_IDENTIFIER"
            exit 1
          fi

          if [ -z "$MARKETING_VERSION" ]; then
            echo "::error::Unable to resolve MARKETING_VERSION"
            exit 1
          fi

          echo "BUNDLE_ID=$BUNDLE_ID" >> "$GITHUB_ENV"
          echo "MARKETING_VERSION=$MARKETING_VERSION" >> "$GITHUB_ENV"

      - name: Resolve Swift packages
        run: |
          set -euo pipefail
          xcodebuild -resolvePackageDependencies \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME"

      - name: Archive app
        run: |
          set -euo pipefail
          ARCHIVE_PATH="$RUNNER_TEMP/AppwriteStarterKit.xcarchive"

          xcodebuild clean archive \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$ARCHIVE_PATH" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME"

      - name: Export IPA
        run: |
          set -euo pipefail
          ARCHIVE_PATH="$RUNNER_TEMP/AppwriteStarterKit.xcarchive"
          EXPORT_PATH="$RUNNER_TEMP/export"

          mkdir -p "$EXPORT_PATH"

          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>compileBitcode</key>
            <false/>
            <key>destination</key>
            <string>export</string>
            <key>method</key>
            <string>ad-hoc</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>$TEAM_ID</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>$BUNDLE_ID</key>
              <string>$PROFILE_NAME</string>
            </dict>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"

      - name: Generate OTA manifest
        run: |
          set -euo pipefail

          INPUT_RELEASE_TAG="${{ inputs.release_tag }}"
          INPUT_RELEASE_TITLE="${{ inputs.release_title }}"
          ARCHIVE_PATH="$RUNNER_TEMP/AppwriteStarterKit.xcarchive"
          EXPORT_PATH="$RUNNER_TEMP/export"

          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            RELEASE_TAG="$INPUT_RELEASE_TAG"
            RELEASE_TITLE="$INPUT_RELEASE_TITLE"
          else
            RELEASE_TAG="$GITHUB_REF_NAME"
            RELEASE_TITLE="${SCHEME} ${GITHUB_REF_NAME}"
          fi

          IPA_PATH="$EXPORT_PATH/$IPA_NAME"
          RELEASE_BASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}"
          IPA_URL="$RELEASE_BASE_URL/$IPA_NAME"
          PLIST_PATH="$EXPORT_PATH/$PLIST_NAME"

          if [ ! -f "$IPA_PATH" ]; then
            echo "::error::IPA was not exported at $IPA_PATH"
            exit 1
          fi

          cat > "$PLIST_PATH" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>items</key>
            <array>
              <dict>
                <key>assets</key>
                <array>
                  <dict>
                    <key>kind</key>
                    <string>software-package</string>
                    <key>url</key>
                    <string>$IPA_URL</string>
                  </dict>
                </array>
                <key>metadata</key>
                <dict>
                  <key>bundle-identifier</key>
                  <string>$BUNDLE_ID</string>
                  <key>bundle-version</key>
                  <string>$MARKETING_VERSION</string>
                  <key>kind</key>
                  <string>software</string>
                  <key>title</key>
                  <string>$SCHEME</string>
                </dict>
              </dict>
            </array>
          </dict>
          </plist>
          EOF

          {
            echo "RELEASE_TAG=$RELEASE_TAG"
            echo "RELEASE_TITLE=$RELEASE_TITLE"
            echo "IPA_PATH=$IPA_PATH"
            echo "PLIST_PATH=$PLIST_PATH"
          } >> "$GITHUB_ENV"

      - name: Create or update GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "$IPA_PATH" "$PLIST_PATH" --clobber
          else
            gh release create "$RELEASE_TAG" "$IPA_PATH" "$PLIST_PATH" \
              --title "$RELEASE_TITLE" \
              --target "$GITHUB_SHA" \
              --generate-notes
          fi
