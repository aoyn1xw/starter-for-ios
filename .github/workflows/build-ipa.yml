name: Build iOS IPA

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build-ipa:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project AppwriteStarterKit.xcodeproj \
            -scheme AppwriteStarterKit

      - name: Build archive (unsigned)
        run: |
          xcodebuild clean archive \
            -project AppwriteStarterKit.xcodeproj \
            -scheme AppwriteStarterKit \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/AppwriteStarterKit.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Package IPA
        run: |
          mkdir -p "$RUNNER_TEMP/ipa/Payload"
          cp -R "$RUNNER_TEMP/AppwriteStarterKit.xcarchive/Products/Applications/AppwriteStarterKit.app" "$RUNNER_TEMP/ipa/Payload/"
          cd "$RUNNER_TEMP/ipa"
          /usr/bin/zip -r "$GITHUB_WORKSPACE/AppwriteStarterKit.ipa" Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: AppwriteStarterKit-ipa
          path: AppwriteStarterKit.ipa
          if-no-files-found: error
